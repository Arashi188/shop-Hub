<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUXE | Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .auth-container {
      min-height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background: linear-gradient(135deg, #fefcf8 0%, #f5f0e8 100%);
    }
    .auth-card {
      background: white;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      padding: 2.5rem;
      max-width: 450px;
      width: 100%;
      animation: fadeUp 0.5s ease;
    }
    .auth-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .auth-header h2 {
      margin-bottom: 0.5rem;
    }
    .form-group {
      margin-bottom: 1.5rem;
    }
    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
    }
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 1rem;
      transition: all 0.2s;
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(192, 122, 91, 0.1);
    }
    .auth-btn {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 40px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .auth-btn:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
    }
    .auth-footer {
      text-align: center;
      margin-top: 1.5rem;
      color: var(--text-light);
    }
    .auth-footer a {
      color: var(--primary);
      text-decoration: none;
    }
    .error-message {
      background: #fee;
      color: #e74c3c;
      padding: 10px;
      border-radius: var(--radius-sm);
      margin-bottom: 1rem;
      display: none;
    }
    .switch-mode {
      margin-top: 1rem;
    }
  </style>
</head>
<body>

<header class="header">
  <div class="nav-container">
    <a href="index.html" class="logo">LUXE</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="shop.html">Shop</a></li>
      <li><a href="collections.html">Collections</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="cart.html" class="cart-icon"><i class="fas fa-shopping-bag"></i> <span class="cart-count">0</span></a></li>
    </ul>
  </div>
</header>

<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h2>Welcome Back</h2>
      <p>Sign in to your LUXE account</p>
    </div>
    <div id="errorMessage" class="error-message"></div>
    <form id="authForm">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" required placeholder="hello@luxe.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" required placeholder="••••••••">
      </div>
      <button type="submit" class="auth-btn" id="submitBtn">Sign In</button>
    </form>
    <div class="auth-footer">
      <p>Don't have an account? <a href="#" id="switchToSignup">Create Account</a></p>
      <p class="switch-mode"><a href="#" id="forgotPassword">Forgot Password?</a></p>
    </div>
  </div>
</div>

<footer class="footer">
  <div class="footer-content">
    <div><h3>LUXE Boutique</h3><p>Premium quality & timeless design</p></div>
    <div class="social-icons"><a href="#"><i class="fab fa-instagram"></i></a><a href="#"><i class="fab fa-twitter"></i></a></div>
  </div>
</footer>

<script src="js/data.js"></script>
<script src="js/script.js"></script>
<script>
  let isLoginMode = true;

  function showError(message) {
    const errorDiv = document.getElementById('errorMessage');
    errorDiv.textContent = message;
    errorDiv.style.display = 'block';
    setTimeout(() => errorDiv.style.display = 'none', 3000);
  }

  function handleAuth(e) {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    if (isLoginMode) {
      // Login
      const users = JSON.parse(localStorage.getItem('luxe_users') || '[]');
      const user = users.find(u => u.email === email && u.password === password);
      if (user) {
        localStorage.setItem('luxe_current_user', JSON.stringify({ email: user.email, name: user.name }));
        showError('Login successful! Redirecting...');
        setTimeout(() => window.location.href = 'account.html', 1000);
      } else {
        showError('Invalid email or password');
      }
    } else {
      // Signup
      const users = JSON.parse(localStorage.getItem('luxe_users') || '[]');
      if (users.find(u => u.email === email)) {
        showError('Email already registered');
        return;
      }
      const name = prompt('Enter your full name:');
      if (!name) return;
      users.push({ email, password, name });
      localStorage.setItem('luxe_users', JSON.stringify(users));
      localStorage.setItem('luxe_current_user', JSON.stringify({ email, name }));
      showError('Account created! Redirecting...');
      setTimeout(() => window.location.href = 'account.html', 1000);
    }
  }

  document.getElementById('authForm').addEventListener('submit', handleAuth);
  document.getElementById('switchToSignup').addEventListener('click', (e) => {
    e.preventDefault();
    isLoginMode = false;
    document.querySelector('.auth-header h2').textContent = 'Create Account';
    document.querySelector('.auth-header p').textContent = 'Join the LUXE community';
    document.getElementById('submitBtn').textContent = 'Sign Up';
    document.querySelector('.auth-footer p:first-child').innerHTML = 'Already have an account? <a href="#" id="switchToLogin">Sign In</a>';
    document.getElementById('switchToLogin').addEventListener('click', (e) => {
      e.preventDefault();
      isLoginMode = true;
      window.location.reload();
    });
    document.getElementById('forgotPassword').style.display = 'none';
  });
</script>
</body>
</html>
