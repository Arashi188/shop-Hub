<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUXE | Sign In / Sign Up</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .auth-container {
      min-height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background: linear-gradient(135deg, #fefcf8 0%, #f5f0e8 100%);
    }
    .auth-card {
      background: white;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      padding: 2rem;
      max-width: 450px;
      width: 100%;
      position: relative;
    }
    .auth-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .auth-header h2 { margin-bottom: 0.5rem; }
    .form-group { margin-bottom: 1.5rem; }
    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
    }
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 1rem;
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
    }
    .auth-btn {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 40px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
    }
    .auth-btn:hover { background: var(--primary-dark); }
    .auth-footer {
      text-align: center;
      margin-top: 1.5rem;
      color: var(--text-light);
    }
    .auth-footer a {
      color: var(--primary);
      text-decoration: none;
    }
    .error-message {
      background: #fee;
      color: #e74c3c;
      padding: 10px;
      border-radius: var(--radius-sm);
      margin-bottom: 1rem;
      display: none;
    }
    .success-message {
      background: #e8f5e9;
      color: #2e7d32;
      padding: 10px;
      border-radius: var(--radius-sm);
      margin-bottom: 1rem;
      display: none;
    }
    /* HIDDEN ADMIN FIELD - Only appears after secret click pattern */
    .admin-hidden-field {
      display: none;
      border-top: 1px solid var(--border);
      padding-top: 1rem;
      margin-top: 0.5rem;
    }
    .admin-hidden-field.show {
      display: block;
    }
    .admin-badge {
      background: #e74c3c;
      color: white;
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 20px;
      margin-left: 8px;
    }
    .logo-click-area {
      cursor: pointer;
      display: inline-block;
    }
    .info-note {
      text-align: center;
      font-size: 0.7rem;
      color: var(--text-light);
      margin-top: 1rem;
    }
  </style>
</head>
<body>

<header class="header">
  <div class="nav-container">
    <a href="index.html" class="logo">🛍️ LUXE</a>
    <ul class="nav-links desktop-nav">
      <li><a href="index.html">Home</a></li>
      <li><a href="shop.html">Shop</a></li>
      <li><a href="collections.html">Collections</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="wishlist.html"><i class="far fa-heart"></i></a></li>
      <li><a href="cart.html" class="cart-icon"><i class="fas fa-shopping-bag"></i> <span class="cart-count">0</span></a></li>
    </ul>
    <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
  </div>
</header>

<div class="mobile-nav" id="mobileNav">
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="shop.html">Shop</a></li>
    <li><a href="collections.html">Collections</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="contact.html">Contact</a></li>
    <li><a href="wishlist.html">Wishlist</a></li>
    <li><a href="cart.html">Cart</a></li>
    <li><a href="login.html">Sign In</a></li>
  </ul>
</div>
<div class="overlay" id="overlay"></div>

<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h2 id="formTitle">Welcome Back</h2>
      <p id="formSubtitle">Sign in to your LUXE account</p>
    </div>
    
    <div id="errorMessage" class="error-message"></div>
    <div id="successMessage" class="success-message"></div>
    
    <form id="authForm">
      <div id="nameField" class="form-group" style="display: none;">
        <label>Full Name</label>
        <input type="text" id="fullName" placeholder="John Doe">
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" required placeholder="hello@luxe.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" required placeholder="••••••••">
      </div>
      <div id="confirmField" class="form-group" style="display: none;">
        <label>Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="••••••••">
      </div>
      
      <!-- HIDDEN ADMIN FIELD - Only appears after secret click pattern -->
      <div id="adminHiddenField" class="admin-hidden-field">
        <div class="form-group">
          <label>🔐 Admin Secret Key <span class="admin-badge">Hidden Access</span></label>
          <input type="password" id="adminSecretKey" placeholder="Enter admin secret key">
        </div>
      </div>
      
      <button type="submit" class="auth-btn" id="submitBtn">Sign In</button>
    </form>
    
    <div class="auth-footer">
      <p id="toggleText">Don't have an account? <a href="#" id="toggleMode">Create Account</a></p>
    </div>
    <div class="info-note">
      <i class="fas fa-shield-alt"></i> Secure login
    </div>
  </div>
</div>

<footer class="footer">
  <div class="footer-content">
    <div><h3>🛍️ LUXE Marketplace</h3></div>
    <div class="social-icons"><a href="#"><i class="fab fa-instagram"></i></a></div>
  </div>
</footer>

<script src="js/data.js"></script>
<script src="js/script.js"></script>
<script>
  // ============================================
  // ADMIN CREDENTIALS (Email + Password)
  // ============================================
  // Admin can login using email and password - NO hidden clicks needed!
  const ADMIN_EMAIL = "admin@luxe.com";
  const ADMIN_PASSWORD = "admin123";
  
  // ============================================
  // HIDDEN ADMIN ACCESS - Secret Click Pattern (BACKUP METHOD)
  // ============================================
  const SECRET_KEY = "LUXE_ADMIN_2025";
  let clickCount = 0;
  let clickTimer = null;
  
  const logoElement = document.querySelector('.logo');
  const adminHiddenField = document.getElementById('adminHiddenField');
  
  function resetClickCount() {
    clickCount = 0;
  }
  
  function revealAdminField() {
    if (adminHiddenField) {
      adminHiddenField.classList.add('show');
      const toast = document.createElement('div');
      toast.textContent = '🔐 Backup admin mode activated. Enter secret key.';
      toast.style.cssText = `
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: #e74c3c;
        color: white;
        padding: 12px 24px;
        border-radius: 40px;
        z-index: 9999;
        animation: fadeInOut 3s ease;
        font-weight: 500;
      `;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }
  }
  
  if (logoElement) {
    logoElement.style.cursor = 'pointer';
    logoElement.addEventListener('click', function(e) {
      e.preventDefault();
      clickCount++;
      if (clickTimer) clearTimeout(clickTimer);
      clickTimer = setTimeout(resetClickCount, 1000);
      if (clickCount === 5) {
        revealAdminField();
        resetClickCount();
      }
    });
  }
  
  // ============================================
  // LOGIN HANDLER (Supports 3 Methods)
  // ============================================
  
  let isLoginMode = true;
  
  function showError(message) {
    const errorDiv = document.getElementById('errorMessage');
    errorDiv.textContent = message;
    errorDiv.style.display = 'block';
    setTimeout(() => errorDiv.style.display = 'none', 3000);
  }
  
  function showSuccess(message) {
    const successDiv = document.getElementById('successMessage');
    successDiv.textContent = message;
    successDiv.style.display = 'block';
    setTimeout(() => successDiv.style.display = 'none', 3000);
  }
  
  function handleAuth(e) {
    e.preventDefault();
    
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    
    // ============================================
    // METHOD 1: ADMIN EMAIL + PASSWORD LOGIN (EASIEST)
    // ============================================
    if (email === ADMIN_EMAIL && password === ADMIN_PASSWORD) {
      localStorage.setItem('luxe_admin_logged_in', 'true');
      sessionStorage.setItem('luxe_admin_session', SECRET_KEY);
      localStorage.setItem('luxe_current_user', JSON.stringify({ 
        email: email, 
        name: 'Administrator',
        isAdmin: true,
        loggedInAt: new Date().toISOString()
      }));
      showSuccess('🔐 Admin access granted! Redirecting to dashboard...');
      setTimeout(() => {
        window.location.href = 'admin.html?key=' + SECRET_KEY;
      }, 1000);
      return;
    }
    
    // ============================================
    // METHOD 2: HIDDEN ADMIN FIELD (BACKUP - Secret Key)
    // ============================================
    const adminFieldVisible = adminHiddenField.classList.contains('show');
    const adminKey = document.getElementById('adminSecretKey')?.value;
    
    if (adminFieldVisible && adminKey === SECRET_KEY) {
      localStorage.setItem('luxe_admin_logged_in', 'true');
      sessionStorage.setItem('luxe_admin_session', SECRET_KEY);
      showSuccess('🔐 Backup admin access granted! Redirecting to dashboard...');
      setTimeout(() => {
        window.location.href = 'admin.html?key=' + SECRET_KEY;
      }, 1000);
      return;
    }
    
    // ============================================
    // METHOD 3: REGULAR USER LOGIN
    // ============================================
    if (isLoginMode) {
      const users = JSON.parse(localStorage.getItem('luxe_users') || '[]');
      const user = users.find(u => u.email === email && u.password === password);
      
      if (user) {
        localStorage.setItem('luxe_current_user', JSON.stringify({ 
          email: user.email, 
          name: user.name,
          isAdmin: false,
          loggedInAt: new Date().toISOString()
        }));
        showSuccess('Login successful! Redirecting...');
        setTimeout(() => {
          window.location.href = 'account.html';
        }, 1000);
      } else {
        showError('Invalid email or password');
      }
    } else {
      // REGULAR USER SIGN UP
      const name = document.getElementById('fullName').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      
      if (!name) {
        showError('Please enter your full name');
        return;
      }
      
      if (password !== confirmPassword) {
        showError('Passwords do not match');
        return;
      }
      
      if (password.length < 4) {
        showError('Password must be at least 4 characters');
        return;
      }
      
      const users = JSON.parse(localStorage.getItem('luxe_users') || '[]');
      
      if (users.find(u => u.email === email)) {
        showError('Email already registered');
        return;
      }
      
      const newUser = {
        email: email,
        password: password,
        name: name,
        registeredDate: new Date().toLocaleDateString(),
        registeredAt: new Date().toISOString()
      };
      
      users.push(newUser);
      localStorage.setItem('luxe_users', JSON.stringify(users));
      localStorage.setItem('luxe_current_user', JSON.stringify({ email: email, name: name, isAdmin: false }));
      
      showSuccess('Account created successfully! Redirecting...');
      setTimeout(() => {
        window.location.href = 'account.html';
      }, 1000);
    }
  }
  
  function toggleMode() {
    isLoginMode = !isLoginMode;
    
    if (isLoginMode) {
      document.getElementById('formTitle').textContent = 'Welcome Back';
      document.getElementById('formSubtitle').textContent = 'Sign in to your LUXE account';
      document.getElementById('submitBtn').textContent = 'Sign In';
      document.getElementById('toggleText').innerHTML = 'Don\'t have an account? <a href="#" id="toggleMode">Create Account</a>';
      document.getElementById('nameField').style.display = 'none';
      document.getElementById('confirmField').style.display = 'none';
    } else {
      document.getElementById('formTitle').textContent = 'Create Account';
      document.getElementById('formSubtitle').textContent = 'Join the LUXE community';
      document.getElementById('submitBtn').textContent = 'Sign Up';
      document.getElementById('toggleText').innerHTML = 'Already have an account? <a href="#" id="toggleMode">Sign In</a>';
      document.getElementById('nameField').style.display = 'block';
      document.getElementById('confirmField').style.display = 'block';
    }
    
    document.getElementById('toggleMode').addEventListener('click', (e) => {
      e.preventDefault();
      toggleMode();
    });
    
    document.getElementById('email').value = '';
    document.getElementById('password').value = '';
    if (document.getElementById('fullName')) document.getElementById('fullName').value = '';
    if (document.getElementById('confirmPassword')) document.getElementById('confirmPassword').value = '';
  }
  
  document.getElementById('authForm').addEventListener('submit', handleAuth);
  document.getElementById('toggleMode').addEventListener('click', (e) => {
    e.preventDefault();
    toggleMode();
  });
  
  // Hamburger menu
  const hamburger = document.getElementById('hamburger');
  const mobileNav = document.getElementById('mobileNav');
  const overlay = document.getElementById('overlay');
  
  function toggleMenu() {
    hamburger.classList.toggle('active');
    mobileNav.classList.toggle('active');
    overlay.classList.toggle('active');
    document.body.style.overflow = mobileNav.classList.contains('active') ? 'hidden' : '';
  }
  
  hamburger?.addEventListener('click', toggleMenu);
  overlay?.addEventListener('click', toggleMenu);
  document.querySelectorAll('.mobile-nav a').forEach(link => link.addEventListener('click', toggleMenu));
  
  updateCartCount();
</script>
</body>
</html>
