<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUXE | Admin Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    /* Admin Dashboard Specific Styles */
    .admin-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 1rem;
    }
    
    .admin-header {
      background: linear-gradient(135deg, var(--secondary), #1a1a2e);
      color: white;
      padding: 1rem 2rem;
      border-radius: var(--radius-lg);
      margin-bottom: 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }
    
    .admin-title {
      font-size: 1.5rem;
      font-weight: 700;
    }
    
    .logout-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      padding: 8px 20px;
      border-radius: 40px;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .logout-btn:hover {
      background: #e74c3c;
    }
    
    /* Stats Grid */
    .admin-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }
    
    .stat-box {
      background: var(--surface);
      padding: 1.5rem;
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-sm);
      text-align: center;
      transition: all 0.3s;
    }
    
    .stat-box:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-md);
    }
    
    .stat-number {
      font-size: 2rem;
      font-weight: 700;
      color: var(--primary);
    }
    
    .stat-label {
      color: var(--text-light);
      margin-top: 0.5rem;
    }
    
    /* Admin Tabs */
    .admin-tabs {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
      border-bottom: 2px solid var(--border);
      padding-bottom: 0.5rem;
    }
    
    .admin-tab {
      padding: 10px 24px;
      background: none;
      border: none;
      cursor: pointer;
      font-weight: 500;
      border-radius: var(--radius-sm);
      transition: all 0.2s;
    }
    
    .admin-tab:hover {
      background: var(--background);
    }
    
    .admin-tab.active {
      background: var(--primary);
      color: white;
    }
    
    /* Tables */
    .admin-table {
      width: 100%;
      overflow-x: auto;
      background: var(--surface);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-sm);
    }
    
    .admin-table table {
      width: 100%;
      border-collapse: collapse;
    }
    
    .admin-table th,
    .admin-table td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    
    .admin-table th {
      background: var(--secondary);
      color: white;
    }
    
    .admin-table tr:hover {
      background: var(--background);
    }
    
    /* Product Form */
    .product-form {
      background: var(--surface);
      padding: 1.5rem;
      border-radius: var(--radius-md);
      margin-bottom: 2rem;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1rem;
    }
    
    .product-form input,
    .product-form select,
    .product-form textarea {
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: inherit;
    }
    
    .product-form button {
      background: var(--primary);
      color: white;
      border: none;
      padding: 10px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-weight: 600;
    }
    
    .edit-btn, .delete-btn {
      padding: 5px 12px;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      margin: 0 3px;
    }
    
    .edit-btn {
      background: #3498db;
      color: white;
    }
    
    .delete-btn {
      background: #e74c3c;
      color: white;
    }
    
    .backup-btn {
      background: #27ae60;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      margin: 0.5rem;
    }
    
    .danger-btn {
      background: #e74c3c;
    }
    
    @media (max-width: 768px) {
      .admin-container { padding: 0.5rem; }
      .admin-table { font-size: 0.8rem; }
      .admin-table th, .admin-table td { padding: 6px; }
    }
  </style>
</head>
<body>

<div class="admin-container">
  <div class="admin-header">
    <div class="admin-title">
      <i class="fas fa-shield-alt"></i> LUXE Admin Dashboard
    </div>
    <button class="logout-btn" onclick="logout()">
      <i class="fas fa-sign-out-alt"></i> Logout
    </button>
  </div>
  
  <!-- Stats Overview -->
  <div class="admin-stats">
    <div class="stat-box">
      <div class="stat-number" id="totalProducts">0</div>
      <div class="stat-label">Total Products</div>
    </div>
    <div class="stat-box">
      <div class="stat-number" id="totalOrders">0</div>
      <div class="stat-label">Total Orders</div>
    </div>
    <div class="stat-box">
      <div class="stat-number" id="totalRevenue">$0</div>
      <div class="stat-label">Total Revenue</div>
    </div>
    <div class="stat-box">
      <div class="stat-number" id="totalUsers">0</div>
      <div class="stat-label">Registered Users</div>
    </div>
  </div>
  
  <!-- Admin Tabs -->
  <div class="admin-tabs">
    <button class="admin-tab active" data-tab="products">📦 Products</button>
    <button class="admin-tab" data-tab="orders">🛒 Orders</button>
    <button class="admin-tab" data-tab="users">👥 Users</button>
    <button class="admin-tab" data-tab="settings">⚙️ Settings</button>
  </div>
  
  <!-- Products Tab -->
  <div id="productsTab" class="admin-tab-content">
    <h3>Add New Product</h3>
    <div class="product-form">
      <input type="text" id="productName" placeholder="Product Name">
      <input type="number" id="productPrice" placeholder="Price">
      <select id="productCategory">
        <option value="Electronics">📱 Electronics</option>
        <option value="Furniture">🛋️ Furniture</option>
        <option value="Beauty">💄 Beauty</option>
        <option value="Groceries">🥑 Groceries</option>
        <option value="Toys">🎮 Toys</option>
        <option value="Sports">⚽ Sports</option>
        <option value="Books">📚 Books</option>
      </select>
      <input type="text" id="productImage" placeholder="Image URL">
      <input type="text" id="productShortDesc" placeholder="Short Description">
      <textarea id="productFullDesc" rows="2" placeholder="Full Description"></textarea>
      <button onclick="addProduct()"><i class="fas fa-plus"></i> Add Product</button>
    </div>
    
    <h3>All Products</h3>
    <div class="admin-table">
      <table>
        <thead>
          <tr><th>ID</th><th>Image</th><th>Name</th><th>Price</th><th>Category</th><th>Actions</th></tr>
        </thead>
        <tbody id="productsTableBody"></tbody>
      </table>
    </div>
    
    <div style="margin-top: 1rem;">
      <button class="backup-btn" onclick="exportData()"><i class="fas fa-download"></i> Export Data (JSON)</button>
      <button class="backup-btn" onclick="exportCSV()"><i class="fas fa-file-csv"></i> Export CSV</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(this)">
      <button class="backup-btn" onclick="document.getElementById('importFile').click()"><i class="fas fa-upload"></i> Import Data</button>
      <button class="backup-btn danger-btn" onclick="resetAllData()"><i class="fas fa-trash"></i> Reset All Data</button>
    </div>
  </div>
  
  <!-- Orders Tab -->
  <div id="ordersTab" class="admin-tab-content" style="display:none;">
    <h3>Customer Orders</h3>
    <div class="admin-table">
      <table>
        <thead>
          <tr><th>Order ID</th><th>Customer</th><th>Items</th><th>Total</th><th>Date</th><th>Status</th><th>Action</th></tr>
        </thead>
        <tbody id="ordersTableBody"></tbody>
      </table>
    </div>
  </div>
  
  <!-- Users Tab -->
  <div id="usersTab" class="admin-tab-content" style="display:none;">
    <h3>Registered Users</h3>
    <div class="admin-table">
      <table>
        <thead>
          <tr><th>Email</th><th>Name</th><th>Registered Date</th><th>Orders</th><th>Action</th></tr>
        </thead>
        <tbody id="usersTableBody"></tbody>
      </table>
    </div>
  </div>
  
  <!-- Settings Tab -->
  <div id="settingsTab" class="admin-tab-content" style="display:none;">
    <h3>Admin Settings</h3>
    <div class="product-form" style="grid-template-columns: 1fr;">
      <div>
        <label>Change Secret Key:</label>
        <input type="text" id="newSecretKey" placeholder="Enter new secret key">
        <button onclick="changeSecretKey()">Update Key</button>
      </div>
      <div>
        <label>WhatsApp Number:</label>
        <input type="text" id="whatsappNumber" placeholder="234XXXXXXXXXX">
        <button onclick="updateWhatsAppNumber()">Update WhatsApp</button>
      </div>
      <div>
        <label>Site Name:</label>
        <input type="text" id="siteName" placeholder="Site Name">
        <button onclick="updateSiteName()">Update Site Name</button>
      </div>
    </div>
  </div>
</div>

<script src="js/data.js"></script>
<script>
  // ============================================
  // SECURITY: Hidden Admin Access Check
  // ============================================
  const SECRET_KEY = "LUXE_ADMIN_2025";  // CHANGE THIS TO YOUR SECRET KEY
  
  function checkAdminAccess() {
    // Check URL parameter
    const urlParams = new URLSearchParams(window.location.search);
    const urlKey = urlParams.get('key');
    
    // Check localStorage
    const storedKey = localStorage.getItem('luxe_admin_key');
    
    // Check sessionStorage
    const sessionKey = sessionStorage.getItem('luxe_admin_session');
    
    if (urlKey === SECRET_KEY || storedKey === SECRET_KEY || sessionKey === SECRET_KEY) {
      // Valid admin access
      sessionStorage.setItem('luxe_admin_session', SECRET_KEY);
      return true;
    }
    
    // Not authorized - redirect to homepage
    window.location.href = 'index.html';
    return false;
  }
  
  // Run security check immediately
  if (!checkAdminAccess()) {
    throw new Error("Unauthorized access");
  }
  
  // ============================================
  // Admin Functions
  // ============================================
  
  let currentProducts = [...products];
  
  function updateStats() {
    document.getElementById('totalProducts').textContent = currentProducts.length;
    
    // Get orders from localStorage
    const allOrders = JSON.parse(localStorage.getItem('luxe_all_orders') || '[]');
    document.getElementById('totalOrders').textContent = allOrders.length;
    
    const totalRev = allOrders.reduce((sum, order) => sum + order.total, 0);
    document.getElementById('totalRevenue').textContent = `$${totalRev.toFixed(2)}`;
    
    const users = JSON.parse(localStorage.getItem('luxe_users') || '[]');
    document.getElementById('totalUsers').textContent = users.length;
  }
  
  function renderProductsTable() {
    const tbody = document.getElementById('productsTableBody');
    tbody.innerHTML = currentProducts.map(p => `
      <tr>
        <td>${p.id}</td>
        <td><img src="${p.image}" width="40" height="40" style="object-fit:cover; border-radius:8px;"></td>
        <td>${p.name}</td>
        <td>$${p.price.toFixed(2)}</td>
        <td>${p.category}</td>
        <td>
          <button class="edit-btn" onclick="editProduct(${p.id})"><i class="fas fa-edit"></i></button>
          <button class="delete-btn" onclick="deleteProduct(${p.id})"><i class="fas fa-trash"></i></button>
        </td>
      </tr>
    `).join('');
  }
  
  function addProduct() {
    const name = document.getElementById('productName').value;
    const price = parseFloat(document.getElementById('productPrice').value);
    const category = document.getElementById('productCategory').value;
    const image = document.getElementById('productImage').value;
    const shortDesc = document.getElementById('productShortDesc').value;
    const fullDesc = document.getElementById('productFullDesc').value;
    
    if (!name || !price) {
      alert('Please fill product name and price');
      return;
    }
    
    const newId = Math.max(...currentProducts.map(p => p.id), 0) + 1;
    const newProduct = {
      id: newId,
      name,
      price,
      category,
      image: image || 'https://via.placeholder.com/600x400?text=New+Product',
      shortDesc: shortDesc || 'New product',
      fullDesc: fullDesc || shortDesc,
      whatsappNumber: "2348123456789"
    };
    
    currentProducts.push(newProduct);
    saveProductsToLocal();
    renderProductsTable();
    updateStats();
    
    // Clear form
    document.getElementById('productName').value = '';
    document.getElementById('productPrice').value = '';
    document.getElementById('productImage').value = '';
    document.getElementById('productShortDesc').value = '';
    document.getElementById('productFullDesc').value = '';
    
    alert('Product added successfully!');
  }
  
  function editProduct(id) {
    const product = currentProducts.find(p => p.id === id);
    if (!product) return;
    
    const newName = prompt('Edit Product Name:', product.name);
    const newPrice = prompt('Edit Price:', product.price);
    const newCategory = prompt('Edit Category (Electronics/Furniture/Beauty/Groceries/Toys/Sports/Books):', product.category);
    const newImage = prompt('Edit Image URL:', product.image);
    
    if (newName) product.name = newName;
    if (newPrice) product.price = parseFloat(newPrice);
    if (newCategory) product.category = newCategory;
    if (newImage) product.image = newImage;
    
    saveProductsToLocal();
    renderProductsTable();
    alert('Product updated!');
  }
  
  function deleteProduct(id) {
    if (confirm('Are you sure you want to delete this product?')) {
      currentProducts = currentProducts.filter(p => p.id !== id);
      saveProductsToLocal();
      renderProductsTable();
      updateStats();
      alert('Product deleted!');
    }
  }
  
  function saveProductsToLocal() {
    localStorage.setItem('luxe_admin_products', JSON.stringify(currentProducts));
    // Also update the global products array for the store
    window.products = currentProducts;
  }
  
  function renderOrdersTable() {
    const allOrders = JSON.parse(localStorage.getItem('luxe_all_orders') || '[]');
    const tbody = document.getElementById('ordersTableBody');
    
    if (allOrders.length === 0) {
      tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">No orders yet</td></tr>';
      return;
    }
    
    tbody.innerHTML = allOrders.map(order => `
      <tr>
        <td>#${order.id}</td>
        <td>${order.customerEmail || 'Guest'}</td>
        <td>${order.itemsCount || order.items?.length || 1} items</td>
        <td>$${order.total.toFixed(2)}</td>
        <td>${order.date || new Date().toLocaleDateString()}</td>
        <td>
          <select onchange="updateOrderStatus(${order.id}, this.value)">
            <option ${order.status === 'Pending' ? 'selected' : ''}>Pending</option>
            <option ${order.status === 'Processing' ? 'selected' : ''}>Processing</option>
            <option ${order.status === 'Shipped' ? 'selected' : ''}>Shipped</option>
            <option ${order.status === 'Delivered' ? 'selected' : ''}>Delivered</option>
            <option ${order.status === 'Cancelled' ? 'selected' : ''}>Cancelled</option>
          </select>
        </td>
        <td><button class="delete-btn" onclick="deleteOrder(${order.id})"><i class="fas fa-trash"></i></button></td>
      </tr>
    `).join('');
  }
  
  function updateOrderStatus(orderId, status) {
    const allOrders = JSON.parse(localStorage.getItem('luxe_all_orders') || '[]');
    const order = allOrders.find(o => o.id === orderId);
    if (order) {
      order.status = status;
      localStorage.setItem('luxe_all_orders', JSON.stringify(allOrders));
      alert('Order status updated!');
      renderOrdersTable();
    }
  }
  
  function deleteOrder(orderId) {
    if (confirm('Delete this order?')) {
      let allOrders = JSON.parse(localStorage.getItem('luxe_all_orders') || '[]');
      allOrders = allOrders.filter(o => o.id !== orderId);
      localStorage.setItem('luxe_all_orders', JSON.stringify(allOrders));
      renderOrdersTable();
      updateStats();
      alert('Order deleted!');
    }
  }
  
  function renderUsersTable() {
    const users = JSON.parse(localStorage.getItem('luxe_users') || '[]');
    const orders = JSON.parse(localStorage.getItem('luxe_all_orders') || '[]');
    const tbody = document.getElementById('usersTableBody');
    
    if (users.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">No registered users yet</td></tr>';
      return;
    }
    
    tbody.innerHTML = users.map(user => {
      const userOrders = orders.filter(o => o.customerEmail === user.email);
      return `
        <tr>
          <td>${user.email}</td>
          <td>${user.name}</td>
          <td>${user.registeredDate || 'N/A'}</td>
          <td>${userOrders.length}</td>
          <td><button class="delete-btn" onclick="deleteUser('${user.email}')"><i class="fas fa-trash"></i></button></td>
        </tr>
      `;
    }).join('');
  }
  
  function deleteUser(email) {
    if (confirm(`Delete user ${email}?`)) {
      let users = JSON.parse(localStorage.getItem('luxe_users') || '[]');
      users = users.filter(u => u.email !== email);
      localStorage.setItem('luxe_users', JSON.stringify(users));
      renderUsersTable();
      updateStats();
      alert('User deleted!');
    }
  }
  
  function exportData() {
    const data = {
      products: currentProducts,
      orders: JSON.parse(localStorage.getItem('luxe_all_orders') || '[]'),
      users: JSON.parse(localStorage.getItem('luxe_users') || '[]'),
      settings: {
        whatsappNumber: localStorage.getItem('luxe_whatsapp') || "2348123456789"
      }
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `luxe_backup_${new Date().toISOString().split('T')[0]}.json`;
    a.click();
    URL.revokeObjectURL(url);
  }
  
  function exportCSV() {
    let csv = "ID,Name,Price,Category\n";
    currentProducts.forEach(p => {
      csv += `${p.id},"${p.name}",${p.price},"${p.category}"\n`;
    });
    const blob = new Blob([csv], {type: 'text/csv'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `luxe_products_${new Date().toISOString().split('T')[0]}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  }
  
  function importData(input) {
    const file = input.files[0];
    if (!file) return;
    
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const data = JSON.parse(e.target.result);
        if (data.products) {
          currentProducts = data.products;
          saveProductsToLocal();
          renderProductsTable();
        }
        if (data.orders) {
          localStorage.setItem('luxe_all_orders', JSON.stringify(data.orders));
        }
        if (data.users) {
          localStorage.setItem('luxe_users', JSON.stringify(data.users));
        }
        alert('Data imported successfully!');
        updateStats();
        renderOrdersTable();
        renderUsersTable();
      } catch(err) {
        alert('Invalid file format');
      }
    };
    reader.readAsText(file);
    input.value = '';
  }
  
  function resetAllData() {
    if (confirm('⚠️ WARNING: This will delete ALL products, orders, and users. Continue?')) {
      if (confirm('ARE YOU ABSOLUTELY SURE? This cannot be undone!')) {
        currentProducts = products; // Reset to original products
        saveProductsToLocal();
        localStorage.removeItem('luxe_all_orders');
        localStorage.removeItem('luxe_users');
        localStorage.removeItem('cart');
        renderProductsTable();
        renderOrdersTable();
        renderUsersTable();
        updateStats();
        alert('All data has been reset!');
      }
    }
  }
  
  function changeSecretKey() {
    const newKey = document.getElementById('newSecretKey').value;
    if (newKey) {
      localStorage.setItem('luxe_admin_key', newKey);
      alert(`Secret key updated! Use ?key=${newKey} to access admin panel.`);
    }
  }
  
  function updateWhatsAppNumber() {
    const number = document.getElementById('whatsappNumber').value;
    if (number) {
      localStorage.setItem('luxe_whatsapp', number);
      alert('WhatsApp number updated!');
    }
  }
  
  function updateSiteName() {
    const name = document.getElementById('siteName').value;
    if (name) {
      localStorage.setItem('luxe_site_name', name);
      alert('Site name updated!');
    }
  }
  
  function logout() {
    sessionStorage.removeItem('luxe_admin_session');
    window.location.href = 'index.html';
  }
  
  // Tab switching
  document.querySelectorAll('.admin-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      
      const tabId = tab.dataset.tab;
      document.getElementById('productsTab').style.display = tabId === 'products' ? 'block' : 'none';
      document.getElementById('ordersTab').style.display = tabId === 'orders' ? 'block' : 'none';
      document.getElementById('usersTab').style.display = tabId === 'users' ? 'block' : 'none';
      document.getElementById('settingsTab').style.display = tabId === 'settings' ? 'block' : 'none';
      
      if (tabId === 'orders') renderOrdersTable();
      if (tabId === 'users') renderUsersTable();
    });
  });
  
  // Load settings
  document.getElementById('whatsappNumber').value = localStorage.getItem('luxe_whatsapp') || "2348123456789";
  document.getElementById('siteName').value = localStorage.getItem('luxe_site_name') || "LUXE Marketplace";
  
  // Initialize
  renderProductsTable();
  updateStats();
</script>
</body>
</html>
