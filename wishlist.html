<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUXE | Wishlist</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .wishlist-container {
      max-width: 1280px;
      margin: 3rem auto;
      padding: 2rem;
      min-height: 60vh;
    }
    .wishlist-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 2rem;
      margin-top: 2rem;
    }
    .wishlist-card {
      position: relative;
    }
    .remove-wishlist {
      position: absolute;
      top: 10px;
      right: 10px;
      background: white;
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.2s;
      z-index: 10;
    }
    .remove-wishlist:hover {
      background: #e74c3c;
      color: white;
    }
    .empty-wishlist {
      text-align: center;
      padding: 4rem;
    }
  </style>
</head>
<body>

<header class="header">
  <div class="nav-container">
    <a href="index.html" class="logo">LUXE</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="shop.html">Shop</a></li>
      <li><a href="collections.html">Collections</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="wishlist.html" class="active">Wishlist</a></li>
      <li><a href="cart.html" class="cart-icon"><i class="fas fa-shopping-bag"></i> <span class="cart-count">0</span></a></li>
    </ul>
  </div>
</header>

<div class="wishlist-container">
  <h2>My Wishlist <span id="wishlistCount"></span></h2>
  <div id="wishlistGrid" class="wishlist-grid"></div>
</div>

<footer class="footer">
  <div class="footer-content">
    <div><h3>LUXE Boutique</h3><p>Premium quality & timeless design</p></div>
    <div class="social-icons"><a href="#"><i class="fab fa-instagram"></i></a></div>
  </div>
</footer>

<script src="js/data.js"></script>
<script src="js/script.js"></script>
<script>
  let wishlist = JSON.parse(localStorage.getItem('wishlist') || '[]');

  function saveWishlist() {
    localStorage.setItem('wishlist', JSON.stringify(wishlist));
    renderWishlist();
  }

  function removeFromWishlist(productId) {
    wishlist = wishlist.filter(id => id !== productId);
    saveWishlist();
    showToast('Removed from wishlist');
  }

  function addToWishlist(productId) {
    if (!wishlist.includes(productId)) {
      wishlist.push(productId);
      saveWishlist();
      showToast('Added to wishlist');
    }
  }

  function renderWishlist() {
    const container = document.getElementById('wishlistGrid');
    const countSpan = document.getElementById('wishlistCount');
    countSpan.textContent = `(${wishlist.length})`;
    
    if (wishlist.length === 0) {
      container.innerHTML = '<div class="empty-wishlist"><i class="far fa-heart" style="font-size: 4rem; color: var(--text-light);"></i><p>Your wishlist is empty.</p><a href="shop.html" class="cta-button" style="margin-top: 1rem;">Explore Products →</a></div>';
      return;
    }
    
    const wishlistProducts = products.filter(p => wishlist.includes(p.id));
    container.innerHTML = wishlistProducts.map(product => `
      <div class="product-card wishlist-card">
        <button class="remove-wishlist" onclick="removeFromWishlist(${product.id})"><i class="fas fa-times"></i></button>
        <img class="product-img" src="${product.image}" alt="${product.name}" onclick="location.href='product-detail.html?id=${product.id}'">
        <div class="product-info">
          <div class="product-name">${product.name}</div>
          <div class="product-price">$${product.price.toFixed(2)}</div>
          <button class="add-to-cart-btn" onclick="addToCart(${product.id}, 1)">
            <i class="fas fa-cart-plus"></i> Add to Cart
          </button>
        </div>
      </div>
    `).join('');
  }

  renderWishlist();
</script>
</body>
</html>
