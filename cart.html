<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUXE | Cart</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .empty-cart {
      text-align: center;
      padding: 4rem;
    }
    .empty-cart a {
      color: var(--primary);
      text-decoration: none;
    }
  </style>
</head>
<body>

<header class="header">
  <div class="nav-container">
    <a href="index.html" class="logo">LUXE</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="shop.html">Shop</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="cart.html" class="active cart-icon"><i class="fas fa-shopping-bag"></i> <span class="cart-count">0</span></a></li>
    </ul>
  </div>
</header>

<div class="cart-container">
  <h2>Shopping Cart</h2>
  <div id="cartContent"></div>
</div>

<footer class="footer">
  <div class="footer-content">
    <div>
      <h3>LUXE Boutique</h3>
      <p>Premium quality & timeless design</p>
      <p>📍 Lagos, Nigeria</p>
    </div>
    <div class="social-icons">
      <a href="#"><i class="fab fa-instagram"></i></a>
      <a href="#"><i class="fab fa-twitter"></i></a>
      <a href="#"><i class="fab fa-facebook"></i></a>
    </div>
  </div>
</footer>

<script src="js/data.js"></script>
<script src="js/script.js"></script>
<script>
  function renderCart() {
    const container = document.getElementById('cartContent');
    if (cart.length === 0) {
      container.innerHTML = '<div class="empty-cart"><p>Your cart is empty.</p><a href="shop.html">Continue Shopping →</a></div>';
      return;
    }
    
    container.innerHTML = `
      <table class="cart-table">
        <thead>
          <tr><th>Product</th><th>Price</th><th>Quantity</th><th>Total</th><th></th></tr>
        </thead>
        <tbody>
          ${cart.map(item => `
            <tr>
              <td><img class="cart-item-img" src="${item.image}" alt="${item.name}"> ${item.name}</td>
              <td>$${item.price.toFixed(2)}</td>
              <td><input type="number" min="1" value="${item.quantity}" onchange="updateQuantity(${item.id}, this.value); renderCart();" style="width:70px; padding:6px;"></td>
              <td>$${(item.price * item.quantity).toFixed(2)}</td>
              <td><button onclick="removeFromCart(${item.id}); renderCart();" style="background:none; border:none; color:#e74c3c; cursor:pointer; font-size:1.2rem;"><i class="fas fa-trash-alt"></i></button></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
      <div class="cart-summary">
        <h3>Total: $${getCartTotal().toFixed(2)}</h3>
        <button class="checkout-btn" onclick="checkout()"><i class="fab fa-whatsapp"></i> Complete Order on WhatsApp</button>
      </div>
    `;
  }
  
  function checkout() {
    let message = "Hello! I'd like to place an order:\n\n";
    cart.forEach(item => {
      message += `• ${item.name}: $${item.price} × ${item.quantity} = $${(item.price * item.quantity).toFixed(2)}\n`;
    });
    message += `\n━━━━━━━━━━━━━━━\n📦 TOTAL: $${getCartTotal().toFixed(2)}\n━━━━━━━━━━━━━━━\n\nPlease confirm my order. Thank you!`;
    const encoded = encodeURIComponent(message);
    window.open(`https://wa.me/2348123456789?text=${encoded}`, '_blank');
  }
  
  renderCart();
</script>
</body>
</html>
