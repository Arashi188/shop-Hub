<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUXE | Cart</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header class="header">
  <div class="nav-container">
    <a href="index.html" class="logo">🛍️ LUXE</a>
    <ul class="nav-links desktop-nav">
      <li><a href="index.html">Home</a></li>
      <li><a href="shop.html">Shop</a></li>
      <li><a href="collections.html">Collections</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="blog.html">Blog</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="wishlist.html"><i class="far fa-heart"></i></a></li>
      <li><a href="cart.html" class="active cart-icon"><i class="fas fa-shopping-bag"></i> <span class="cart-count">0</span></a></li>
      <li><a href="login.html" id="desktopAuthLink"><i class="fas fa-user"></i> Sign In</a></li>
    </ul>
    <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
  </div>
</header>

<div class="mobile-nav" id="mobileNav">
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="shop.html">Shop</a></li>
    <li><a href="collections.html">Collections</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="blog.html">Blog</a></li>
    <li><a href="contact.html">Contact</a></li>
    <li><a href="wishlist.html">Wishlist ❤️</a></li>
    <li><a href="cart.html">Cart 🛒</a></li>
    <li><a href="account.html">My Account 👤</a></li>
    <li><a href="login.html">Sign In 🔑</a></li>
  </ul>
</div>
<div class="overlay" id="overlay"></div>

<div class="cart-container">
  <h2>Shopping Cart</h2>
  <div id="cartContent"></div>
</div>

<footer class="footer">
  <div class="footer-content">
    <div><h3>🛍️ LUXE Marketplace</h3><p>Your one-stop shop for everything</p></div>
    <div class="social-icons"><a href="#"><i class="fab fa-instagram"></i></a><a href="#"><i class="fab fa-twitter"></i></a></div>
  </div>
</footer>

<script src="js/data.js"></script>
<script src="js/script.js"></script>
<script>
  function renderCart() {
    const container = document.getElementById('cartContent');
    if (cart.length === 0) { 
      container.innerHTML = '<div style="text-align:center; padding:4rem;"><p>Your cart is empty.</p><a href="shop.html" class="cta-button" style="margin-top:1rem; display:inline-block;">Continue Shopping →</a></div>'; 
      return; 
    }
    container.innerHTML = `
      <table class="cart-table">
        <thead>
          <tr><th>Product</th><th>Price (₦)</th><th>Quantity</th><th>Total (₦)</th><th></th></tr>
        </thead>
        <tbody>
          ${cart.map(item => `
            <tr>
              <td data-label="Product"><img class="cart-item-img" src="${item.image}" alt="${item.name}"> ${item.name}</td>
              <td data-label="Price">₦${item.price.toLocaleString('en-NG')}</td>
              <td data-label="Quantity"><input type="number" min="1" value="${item.quantity}" onchange="updateQuantity(${item.id}, this.value); renderCart();" style="width:70px; padding:6px;"></td>
              <td data-label="Total">₦${(item.price * item.quantity).toLocaleString('en-NG')}</td>
              <td data-label="Action"><button onclick="removeFromCart(${item.id}); renderCart();" style="background:none; border:none; color:#e74c3c; cursor:pointer;"><i class="fas fa-trash-alt"></i></button></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
      <div class="cart-summary">
        <h3>Total: ₦${getCartTotal().toLocaleString('en-NG')}</h3>
        <button class="checkout-btn" onclick="checkout()"><i class="fab fa-whatsapp"></i> Complete Order on WhatsApp</button>
      </div>
    `;
  }
  
  function checkout() {
    let message = "Hello! I'd like to place an order:\n\n";
    cart.forEach(item => message += `• ${item.name}: ₦${item.price.toLocaleString('en-NG')} × ${item.quantity} = ₦${(item.price * item.quantity).toLocaleString('en-NG')}\n`);
    message += `\n━━━━━━━━━━━━━━━\n📦 TOTAL: ₦${getCartTotal().toLocaleString('en-NG')}\n━━━━━━━━━━━━━━━\n\nPlease confirm my order. Thank you!`;
    window.open(`https://wa.me/2347088028747?text=${encodeURIComponent(message)}`, '_blank');
  }
  
  const hamburger = document.getElementById('hamburger');
  const mobileNav = document.getElementById('mobileNav');
  const overlay = document.getElementById('overlay');
  function toggleMenu() { hamburger.classList.toggle('active'); mobileNav.classList.toggle('active'); overlay.classList.toggle('active'); document.body.style.overflow = mobileNav.classList.contains('active') ? 'hidden' : ''; }
  hamburger?.addEventListener('click', toggleMenu);
  overlay?.addEventListener('click', toggleMenu);
  document.querySelectorAll('.mobile-nav a').forEach(link => link.addEventListener('click', toggleMenu));
  
  renderCart();
  updateCartCount();
</script>
</body>
</html>
