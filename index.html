<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUXE | Premium Marketplace</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .hero { position: relative; width: 100%; height: 60vh; min-height: 400px; overflow: hidden; }
    @media (min-width: 768px) { .hero { height: 75vh; } }
    .slides-container { position: relative; width: 100%; height: 100%; }
    .slide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; visibility: hidden; transition: opacity 0.8s ease; background-size: cover; background-position: center; display: flex; align-items: center; }
    .slide.active { opacity: 1; visibility: visible; z-index: 2; }
    .slide-content { max-width: 1280px; margin-left: 5%; padding: 1.5rem; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); border-radius: 20px; color: white; }
    @media (min-width: 768px) { .slide-content { margin-left: 8%; padding: 2rem; } }
    .slide-content h2 { font-size: 1.8rem; margin-bottom: 0.5rem; }
    @media (min-width: 768px) { .slide-content h2 { font-size: 3rem; } }
    .cta-button { background: #c07a5b; border: none; padding: 10px 24px; border-radius: 40px; font-weight: 600; color: white; cursor: pointer; text-decoration: none; display: inline-block; }
    .slider-arrow { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.7); width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 20; border: none; }
    .arrow-left { left: 10px; } .arrow-right { right: 10px; }
    .dots { position: absolute; bottom: 15px; left: 0; right: 0; display: flex; justify-content: center; gap: 8px; z-index: 20; }
    .dot { width: 8px; height: 8px; background: rgba(255,255,255,0.6); border-radius: 50%; cursor: pointer; }
    .dot.active { background: #c07a5b; width: 20px; border-radius: 20px; }
  </style>
</head>
<body>

<header class="header">
  <div class="nav-container">
    <a href="index.html" class="logo">🛍️ LUXE</a>
    <ul class="nav-links desktop-nav">
      <li><a href="index.html" class="active">Home</a></li>
      <li><a href="shop.html">Shop</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="cart.html" class="cart-icon"><i class="fas fa-shopping-bag"></i> <span class="cart-count">0</span></a></li>
    </ul>
    <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
  </div>
</header>

<div class="mobile-nav" id="mobileNav">
  <ul><li><a href="index.html">Home</a></li><li><a href="shop.html">Shop</a></li><li><a href="about.html">About</a></li><li><a href="contact.html">Contact</a></li><li><a href="cart.html">Cart</a></li><li><a href="login.html">Sign In</a></li></ul>
</div>
<div class="overlay" id="overlay"></div>

<section class="hero" id="hero-slider">
  <div class="slides-container" id="slidesContainer"></div>
  <button class="slider-arrow arrow-left" id="prevSlide"><i class="fas fa-chevron-left"></i></button>
  <button class="slider-arrow arrow-right" id="nextSlide"><i class="fas fa-chevron-right"></i></button>
  <div class="dots" id="dotsContainer"></div>
</section>

<h2 class="section-title">⭐ Featured Products</h2>
<div class="products-grid" id="featuredGrid"></div>

<footer class="footer">
  <div class="footer-content"><div><h3>🛍️ LUXE Marketplace</h3><p>📍 Lagos, Nigeria</p><p>📞 +234 913 439 1505</p></div></div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// Hero Slider Data
const slidesData = [
  { bg: "https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?w=1600&auto=format", headline: "Welcome to LUXE", subtext: "Your premier marketplace", cta: "Shop Now" },
  { bg: "https://images.unsplash.com/photo-1483985988355-763728e1935b?w=1600&auto=format", headline: "New Arrivals", subtext: "Discover our latest collection", cta: "Shop Now" },
  { bg: "https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=1600&auto=format", headline: "Free Shipping", subtext: "On orders over ₦75,000", cta: "Shop Now" }
];

let currentSlide = 0;
let slideInterval;

function buildSlides() {
  const container = document.getElementById('slidesContainer');
  const dotsContainer = document.getElementById('dotsContainer');
  if (!container) return;
  container.innerHTML = '';
  dotsContainer.innerHTML = '';
  slidesData.forEach((slide, idx) => {
    const slideDiv = document.createElement('div');
    slideDiv.className = `slide ${idx === 0 ? 'active' : ''}`;
    slideDiv.style.backgroundImage = `linear-gradient(0deg, rgba(0,0,0,0.4), rgba(0,0,0,0.3)), url('${slide.bg}')`;
    slideDiv.innerHTML = `<div class="slide-content"><h2>${slide.headline}</h2><p>${slide.subtext}</p><a href="shop.html" class="cta-button">${slide.cta}</a></div>`;
    container.appendChild(slideDiv);
    const dot = document.createElement('div');
    dot.classList.add('dot');
    if (idx === 0) dot.classList.add('active');
    dot.addEventListener('click', () => goToSlide(idx));
    dotsContainer.appendChild(dot);
  });
  slidesArray = document.querySelectorAll('.slide');
}

function updateActiveSlide() {
  document.querySelectorAll('.slide').forEach((slide, i) => slide.classList.toggle('active', i === currentSlide));
  document.querySelectorAll('.dot').forEach((dot, i) => dot.classList.toggle('active', i === currentSlide));
}

function nextSlide() { currentSlide = (currentSlide + 1) % slidesData.length; updateActiveSlide(); }
function prevSlide() { currentSlide = (currentSlide - 1 + slidesData.length) % slidesData.length; updateActiveSlide(); }
function goToSlide(index) { currentSlide = index; updateActiveSlide(); }
function startAutoPlay() { if (slideInterval) clearInterval(slideInterval); slideInterval = setInterval(nextSlide, 5000); }

// Supabase
const SUPABASE_URL = "https://YOUR_PROJECT_ID.supabase.co";
const SUPABASE_ANON_KEY = "YOUR_ANON_KEY_HERE";
let products = [];

async function loadProducts() {
  try {
    const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const { data, error } = await supabase.from('products').select('*');
    if (!error && data) products = data;
  } catch(e) { console.log('Supabase not connected'); }
  renderProducts();
}

function renderProducts() {
  const grid = document.getElementById('featuredGrid');
  if (!grid) return;
  if (products.length === 0) { grid.innerHTML = '<p style="text-align:center">No products yet</p>'; return; }
  grid.innerHTML = products.slice(0, 8).map(p => `
    <div class="product-card">
      <img class="product-img" src="${p.image}">
      <div class="product-info">
        <div class="product-name">${p.name}</div>
        <div class="product-price">₦${p.price.toLocaleString('en-NG')}</div>
        <button class="add-to-cart-btn" onclick="addToCart(${p.id}, 1)">Add to Cart</button>
      </div>
    </div>
  `).join('');
}

function addToCart(id, qty) { alert('Add to cart: ' + id); }
function updateCartCount() { document.querySelectorAll('.cart-count').forEach(el => el.textContent = '0'); }

// Hamburger menu
const hamburger = document.getElementById('hamburger');
const mobileNav = document.getElementById('mobileNav');
const overlay = document.getElementById('overlay');
function toggleMenu() { hamburger.classList.toggle('active'); mobileNav.classList.toggle('active'); overlay.classList.toggle('active'); document.body.style.overflow = mobileNav.classList.contains('active') ? 'hidden' : ''; }
hamburger?.addEventListener('click', toggleMenu);
overlay?.addEventListener('click', toggleMenu);
document.querySelectorAll('.mobile-nav a').forEach(link => link.addEventListener('click', toggleMenu));

document.getElementById('prevSlide')?.addEventListener('click', prevSlide);
document.getElementById('nextSlide')?.addEventListener('click', nextSlide);

buildSlides();
startAutoPlay();
loadProducts();
updateCartCount();
</script>
</body>
</html>
